<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Мальопис — Studio Liminal</title>

    <style>
        *{
            box-sizing:border-box;
        }

        html{
            scroll-behavior:smooth;
        }

        body{
            margin:0;
            background:#070707;
            color:#f4f1ea;
            font-family:Arial, sans-serif;
        }

        .comic-catalog{
            min-height:100vh;
            padding:70px 24px 90px;
        }

        .catalog-header{
            width:min(100%, 1100px);
            margin:0 auto 50px;
            text-align:center;
        }

        .back-link{
            display:inline-block;
            margin-bottom:34px;
            color:#c9a778;
            text-decoration:none;
            font-size:15px;
        }

        .studio-label{
            margin:0 0 14px;
            color:rgba(244,241,234,.58);
            font-size:12px;
            letter-spacing:4px;
            text-transform:uppercase;
        }

        .catalog-header h1{
            margin:0;
            font-family:Georgia, "Times New Roman", serif;
            font-size:clamp(44px, 7vw, 82px);
            font-weight:400;
            line-height:1.02;
        }

        .catalog-intro{
            max-width:680px;
            margin:24px auto 0;
            color:rgba(244,241,234,.75);
            font-size:17px;
            line-height:1.65;
        }

        .chapter-grid{
            width:min(100%, 1100px);
            margin:0 auto;
            display:grid;
            grid-template-columns:repeat(2, minmax(0, 1fr));
            gap:28px;
        }

        .chapter-card{
            position:relative;
            overflow:hidden;
            min-height:520px;
            border:1px solid rgba(255,255,255,.10);
            background:#111;
            text-decoration:none;
            color:#f4f1ea;
        }

        .chapter-card img{
            display:block;
            width:100%;
            height:100%;
            min-height:520px;
            object-fit:cover;
            transition:transform .5s ease;
        }

        .chapter-card::after{
            content:"";
            position:absolute;
            inset:0;
            background:linear-gradient(
                to top,
                rgba(0,0,0,.92) 0%,
                rgba(0,0,0,.30) 50%,
                rgba(0,0,0,.08) 100%
            );
        }

        .chapter-card:hover img{
            transform:scale(1.025);
        }

        .chapter-info{
            position:absolute;
            z-index:2;
            left:0;
            right:0;
            bottom:0;
            padding:34px;
        }

        .chapter-number{
            margin:0 0 10px;
            color:#c9a778;
            font-size:12px;
            letter-spacing:3px;
            text-transform:uppercase;
        }

        .chapter-info h2{
            margin:0;
            font-family:Georgia, "Times New Roman", serif;
            font-size:42px;
            font-weight:400;
        }

        .chapter-description{
            margin:15px 0 0;
            color:rgba(244,241,234,.78);
            font-size:15px;
            line-height:1.55;
        }

        .read-link{
            display:inline-block;
            margin-top:24px;
            color:#f4f1ea;
            font-size:14px;
            letter-spacing:1px;
        }

        .coming-soon{
            min-height:520px;
            padding:34px;
            display:flex;
            flex-direction:column;
            justify-content:flex-end;
            border:1px solid rgba(255,255,255,.08);
            background:
                linear-gradient(rgba(8,8,8,.84), rgba(8,8,8,.96)),
                #111;
        }

        .coming-soon h2{
            margin:0;
            font-family:Georgia, "Times New Roman", serif;
            font-size:42px;
            font-weight:400;
        }

        .coming-soon p:last-child{
            margin:15px 0 0;
            color:rgba(244,241,234,.55);
            line-height:1.55;
        }

        @media screen and (max-width:768px){
            .comic-catalog{
                padding:42px 18px 60px;
            }

            .catalog-header{
                margin-bottom:34px;
            }

            .back-link{
                margin-bottom:28px;
            }

            .studio-label{
                font-size:10px;
                letter-spacing:3px;
            }

            .catalog-header h1{
                font-size:44px;
            }

            .catalog-intro{
                margin-top:20px;
                font-size:15px;
            }

            .chapter-grid{
                grid-template-columns:1fr;
                gap:20px;
            }

            .chapter-card,
            .chapter-card img,
            .coming-soon{
                min-height:500px;
            }

            .chapter-info,
            .coming-soon{
                padding:26px;
            }

            .chapter-info h2,
            .coming-soon h2{
                font-size:36px;
            }
        }
    </style>
</head>

<body>

    <main class="comic-catalog">

        <header class="catalog-header">
            <a class="back-link" href="index/index.html">← На головну</a>

            <p class="studio-label">Studio Liminal представляє</p>

            <h1>Поки нас ніхто не бачить</h1>

            <p class="catalog-intro">
                Історія про студентів, викладачів, таємниці та вибір,
                який змінює долі.
            </p>
        </header>

        <section class="chapter-grid">

            <a class="chapter-card" href="chapter1.html">
                <img
                    src="images/chapters/chapter-01/001.png"
                    alt="Обкладинка першого розділу мальопису"
                >

                <div class="chapter-info">
                    <p class="chapter-number">Розділ 01</p>
                    <h2>Початок історії</h2>

                    <p class="chapter-description">
                        Перший розділ офіційного мальопису Studio Liminal.
                    </p>

                    <span class="read-link">Читати розділ →</span>
                </div>
            </a>

            <article class="coming-soon">
                <p class="chapter-number">Розділ 02</p>
                <h2>Продовження</h2>
                <p>Новий розділ з’явиться незабаром.</p>
            </article>

        </section>

    </main>

</body>
</html>
