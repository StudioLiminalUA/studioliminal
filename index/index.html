<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio Liminal</title>
<link rel="stylesheet" href="../style.css?v=21">
</head>

<body>

<header>

<nav class="navbar">

    <div class="logo">
        <a href="../index/index.html">STUDIO LIMINAL</a>
    </div>

    <button class="menu-toggle"
            type="button"
            aria-label="Відкрити меню"
            aria-expanded="false">
        <span></span>
        <span></span>
        <span></span>
    </button>

    <ul class="menu">
        <li><a href="../index/index.html">Головна</a></li>
        <li><a href="../comic.html">Мальопис</a></li>
        <li><a href="../characters.html">Персонажі</a></li>
        <li><a href="#">Про студію</a></li>
        <li><a href="#">Підтримати</a></li>
    </ul>

</nav>
</nav>

</header>

<section class="hero">

  <div class="hero-content">

    <h1>ПОКИ НАС<br>НІХТО НЕ БАЧИТЬ</h1>

    <p>
      Історія про студентів, викладачів, таємниці та вибір,<br>
      який змінює долі.
    </p>

    <a href="../comic.html" class="hero-button">
      Читати мальопис
    </a>

  </div>

</section>
<script>
    const menuToggle = document.querySelector('.menu-toggle');
    const menu = document.querySelector('.menu');

    menuToggle.addEventListener('click', function () {
        const isOpen = menu.classList.toggle('menu-open');

        menuToggle.classList.toggle('active', isOpen);
        menuToggle.setAttribute('aria-expanded', isOpen);
    });

    document.querySelectorAll('.menu a').forEach(function (link) {
        link.addEventListener('click', function () {
            menu.classList.remove('menu-open');
            menuToggle.classList.remove('active');
            menuToggle.setAttribute('aria-expanded', 'false');
        });
    });
</script>
</body>
</html>
